name: SkillSwap CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend lint and tests
    runs-on: ubuntu-latest
    env:
      FAIL_HEALTH: "true"
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fail on startup guard
        if: vars.FAIL_STARTUP == 'true'
        env:
          FAIL_STARTUP: "true"
        run: node src/server.js

      - name: Lint backend
        run: npm run lint

      - name: Run backend tests
        run: npm test

  frontend:
    name: Frontend lint, test, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker image build and publish
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t skillswap-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t skillswap-frontend:ci ./frontend

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish backend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillswap-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillswap-backend:${{ github.sha }}

      - name: Publish frontend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=http://localhost:5000/api
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillswap-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillswap-frontend:${{ github.sha }}
