global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
    relabel_configs:
      - target_label: instance
        replacement: "localhost:9090"

  - job_name: "skillswap-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:5000"]
    relabel_configs:
      - target_label: instance
        replacement: "localhost:5000"
